name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: raspet-repo
    env:
      # 하드웨어/디스플레이 없이(헤드리스) 테스트한다.
      RASPET_DUMMY: "1"
      RASPET_HEADLESS: "1"
      SDL_VIDEODRIVER: "dummy"
      SDL_AUDIODRIVER: "dummy"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        # 게임 로직 테스트에 필요한 최소 패키지만 설치한다.
        # (opencv/mediapipe/gpiozero/picamera2 등 하드웨어 의존 패키지는
        #  코드에서 더미로 폴백하므로 CI에서 설치하지 않는다.)
        run: pip install pygame Pillow numpy pytest

      - name: Run tests
        run: pytest -q
